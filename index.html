<!DOCTYPE html>
<html>
<head>
    <title>e-CAR Spin & Win</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #111;
            color: white;
            margin: 0;
            padding: 20px;
        }

        .card {
            max-width: 520px;
            margin: auto;
            background: #1c1c1c;
            padding: 25px;
            border-radius: 18px;
            box-shadow: 0 0 25px rgba(0, 176, 80, 0.35);
        }

        .brand {
            font-size: 38px;
            font-weight: bold;
            color: #00b050;
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 18px;
            margin-bottom: 20px;
            color: #ddd;
        }

        input {
            padding: 13px;
            width: 85%;
            margin: 7px;
            border-radius: 8px;
            border: none;
            font-size: 16px;
        }

        .wheel-container {
            position: relative;
            margin: 25px auto;
            width: 400px;
            height: 400px;
        }

        .pointer {
            width: 0;
            height: 0;
            border-left: 25px solid transparent;
            border-right: 25px solid transparent;
            border-top: 55px solid #ff0000;
            position: absolute;
            top: -10px;
            left: 175px;
            z-index: 10;
        }

        canvas {
            transition: transform 4s ease-out;
        }

        button {
            padding: 15px 40px;
            font-size: 22px;
            background: #00b050;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
        }

            button:hover {
                background: #008a3d;
            }

            button:disabled {
                background: #555;
                cursor: not-allowed;
            }

        #result {
            margin-top: 25px;
            font-size: 23px;
            font-weight: bold;
            white-space: pre-line;
            color: #ffcc00;
        }

        .terms {
            font-size: 12px;
            color: #aaa;
            margin-top: 20px;
            line-height: 1.5;
        }

        @media (max-width: 500px) {
            .wheel-container {
                width: 320px;
                height: 320px;
            }

            canvas {
                width: 320px;
                height: 320px;
            }

            .pointer {
                left: 135px;
            }
        }
    </style>
</head>

<body>

    <div class="card">
        <div class="brand">e-CAR</div>
        <div class="subtitle">Spin & Win a Workshop Discount 🎡</div>

        <input id="name" type="text" placeholder="Enter your name"><br>
        <input id="cell" type="text" placeholder="Enter your cellphone number"><br>

        <div class="wheel-container">
            <div class="pointer"></div>
            <canvas id="wheelCanvas" width="400" height="400"></canvas>
        </div>

        <button id="spinButton" onclick="spinWheel()">SPIN</button>

        <div id="result"></div>

        <div class="terms">
            One spin per customer. Voucher valid for 30 days. Discount cannot be exchanged for cash.
            Discount applies to labour only unless stated otherwise.
        </div>
    </div>

    <script>
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyH5T2BF8z2ncxK5-rfYmJEaR-qnY0CfmzVn_pGG_Gs8E9XQjDAXy5QI_3c895QXHlI/exec";

        const canvas = document.getElementById("wheelCanvas");
        const ctx = canvas.getContext("2d");

        const prizes = [
            "5% OFF",
            "10% OFF",
            "25% OFF",
            "R250 OFF",
            "15% OFF",
            "TRY AGAIN"
        ];

        const colors = [
            "#ffcc00",
            "#00b050",
            "#0070c0",
            "#ff6600",
            "#7030a0",
            "#c00000"
        ];

        // Weighted prizes:
        // More entries = higher chance.
        const weightedPrizes = [
            "5% OFF", "5% OFF", "5% OFF",
            "10% OFF", "10% OFF", "10% OFF",
            "15% OFF", "15% OFF",
            "TRY AGAIN", "TRY AGAIN",
            "25% OFF",
            "R250 OFF"
        ];

        const sliceAngle = 360 / prizes.length;
        let rotation = 0;
        let spinning = false;

        function drawWheel() {
            const centerX = 200;
            const centerY = 200;
            const radius = 190;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < prizes.length; i++) {
                const startAngle = (i * sliceAngle - 90) * Math.PI / 180;
                const endAngle = ((i + 1) * sliceAngle - 90) * Math.PI / 180;

                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, startAngle, endAngle);
                ctx.closePath();

                ctx.fillStyle = colors[i];
                ctx.fill();

                ctx.strokeStyle = "#111";
                ctx.lineWidth = 3;
                ctx.stroke();

                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate((i * sliceAngle + sliceAngle / 2 - 90) * Math.PI / 180);
                ctx.textAlign = "right";
                ctx.fillStyle = "white";
                ctx.font = "bold 18px Arial";
                ctx.fillText(prizes[i], radius - 20, 8);
                ctx.restore();
            }

            ctx.beginPath();
            ctx.arc(200, 200, 28, 0, 2 * Math.PI);
            ctx.fillStyle = "#111";
            ctx.fill();

            ctx.fillStyle = "#00b050";
            ctx.font = "bold 13px Arial";
            ctx.textAlign = "center";
            ctx.fillText("e-CAR", 200, 205);
        }

        function generateVoucherCode() {
            return "ECAR-" + Math.random().toString(36).substring(2, 8).toUpperCase();
        }

        function chooseWeightedPrize() {
            const randomIndex = Math.floor(Math.random() * weightedPrizes.length);
            return weightedPrizes[randomIndex];
        }

        function getPrizeIndex(prize) {
            return prizes.indexOf(prize);
        }

        function spinWheel() {
            if (spinning) return;

            const name = document.getElementById("name").value.trim();
            const cell = document.getElementById("cell").value.trim();
            const result = document.getElementById("result");
            const spinButton = document.getElementById("spinButton");

            if (!name || !cell) {
                alert("Please enter your name and cellphone number");
                return;
            }

            if (cell.length < 10) {
                alert("Please enter a valid cellphone number");
                return;
            }

            spinning = true;
            spinButton.disabled = true;
            result.innerText = "";

            const selectedPrize = chooseWeightedPrize();
            const selectedIndex = getPrizeIndex(selectedPrize);

            const fullSpins = 360 * 6;
            const selectedSliceMiddle = selectedIndex * sliceAngle + sliceAngle / 2;

            // This makes the selected prize land under the top pointer.
            const targetRotation = 360 - selectedSliceMiddle;

            rotation += fullSpins + targetRotation;

            canvas.style.transform = `rotate(${rotation}deg)`;

            setTimeout(() => {
                const voucherCode = generateVoucherCode();

                fetch(GOOGLE_SCRIPT_URL, {
                    method: "POST",
                    body: JSON.stringify({
                        name: name,
                        cell: cell,
                        prize: selectedPrize,
                        voucherCode: voucherCode
                    })
                })
                    .then(response => response.json())
                    .then(data => {
                        if (data.status === "duplicate") {
                            result.innerText = "⚠️ This cellphone number has already used the spin wheel.";
                        } else {
                            result.innerText =
                                "🎉 You've won: " + selectedPrize +
                                "\nVoucher: " + voucherCode;
                        }
                    })
                    .catch(error => {
                        result.innerText =
                            "🎉 You've won: " + selectedPrize +
                            "\nVoucher: " + voucherCode +
                            "\n\n⚠️ Voucher could not save. Please take a screenshot.";
                    })
                    .finally(() => {
                        spinning = false;
                        spinButton.disabled = false;
                    });

            }, 4200);
        }

        drawWheel();
    </script>

</body>
</html>
